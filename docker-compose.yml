services:
  transcoder:
    build:
      context: .
      dockerfile: apps/transcoder/Dockerfile
    container_name: transcoder
    ports:
      - "${TRANSCODER_PORT:-3002}:${TRANSCODER_PORT:-3002}"
    environment:
      - PORT=${TRANSCODER_PORT:-3002}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - ENCODING_QUEUE=${ENCODING_QUEUE:-video_encoding_queue}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-my-bucket}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - video-uploads:/usr/src/app/uploads
    depends_on:
      - rabbitmq
      - minio
    networks:
      - app-network

  wowza-streamer:
    build:
      context: .
      dockerfile: apps/wowza-streamer/Dockerfile
    container_name: wowza-streamer
    ports:
      - "${WOWZA_STREAMER_PORT:-3003}:${WOWZA_STREAMER_PORT:-3003}"
    environment:
      - PORT=${WOWZA_STREAMER_PORT:-3003}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MONGO_SERVICE_URL=${MONGO_SERVICE_URL:-http://mongo:27017}
      - WOWZA_URL=${WOWZA_URL:-http://wowza-server:1935/vods3/_definst_}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-my-bucket}
    depends_on:
      - mongo
    networks:
      - app-network

  video-api:
    build:
      context: .
      dockerfile: apps/video-api/Dockerfile
    container_name: video-api
    ports:
      - "${VIDEO_API_PORT:-3001}:${VIDEO_API_PORT:-3001}"
    environment:
      - PORT=${VIDEO_API_PORT:-3001}
      - MONGO_SERVICE_URL=${MONGO_SERVICE_URL:-http://mongo:27017}
      - UPLOAD_DIR=${UPLOAD_DIR:-/usr/src/app/uploads}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - ENCODING_QUEUE=${ENCODING_QUEUE:-video_encoding_queue}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - video-uploads:/usr/src/app/uploads
    depends_on:
      - rabbitmq
      - mongo
    networks:
      - app-network

  genre-api:
    build:
      context: .
      dockerfile: apps/genre-api/Dockerfile
    container_name: genre-api
    ports:
      - "${GENRE_API_PORT:-3004}:${GENRE_API_PORT:-3004}"
    environment:
      - PORT=${GENRE_API_PORT:-3004}
      - MONGO_SERVICE_URL=${MONGO_SERVICE_URL:-http://mongo:27017}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - mongo
    networks:
      - app-network

  playlist-api:
    build:
      context: .
      dockerfile: apps/playlist-api/Dockerfile
    container_name: playlist-api
    ports:
      - "${PLAYLIST_API_PORT:-3005}:${PLAYLIST_API_PORT:-3005}"
    environment:
      - PORT=${PLAYLIST_API_PORT:-3005}
      - MONGO_SERVICE_URL=${MONGO_SERVICE_URL:-http://mongo:27017}
      - VIDEO_SERVICE_URL=${VIDEO_SERVICE_URL:-http://video-api:3001}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - mongo
      - video-api
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - app-network

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${S3_BUCKET_NAME:-my-bucket} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET_NAME:-my-bucket};
      exit 0;
      "
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  video-uploads:
  mongo-data:
  minio-data:
